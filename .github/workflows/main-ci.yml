name: Main CI CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  security-events: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B package --file ./pom.xml

  deploy:
    needs: [ build ]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B package --file ./pom.xml

      - name: Find build artifacts
        id: find-artifacts
        run: |
          ARTIFACTS=$(find spigot-plugin/target -maxdepth 1 -name "*.jar" | tr '\n' ' ')
          if [ -z "$ARTIFACTS" ]; then
            echo "No JAR artifacts found in spigot-plugin/target"
            exit 1
          fi
          echo "Found artifacts: $ARTIFACTS"
          echo "artifacts=$ARTIFACTS" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_MINECRAFT_EMPIRES_ARTIFACT_UPLOAD }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_SECRET_MINECRAFT_EMPIRES_ARTIFACT_UPLOAD }}
          aws-region: 'us-east-1'

      - name: Upload artifacts to S3
        run: |
          S3_DEST="s3://${{ secrets.AWS_S3_MINECRAFT_EMPIRES_BUCKET }}/"
          for JAR in ${{ steps.find-artifacts.outputs.artifacts }}; do
            echo "Uploading $JAR..."
            aws s3 cp "$JAR" "$S3_DEST/$(basename $JAR)" \
              --sse aws:kms \
              --no-progress
          done

      - name: Confirm S3 upload
        run: |
          aws s3 ls "s3://${{ secrets.AWS_S3_MINECRAFT_EMPIRES_BUCKET }}/"

  security-sca:
    needs: [ build ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Snyk SCA
        uses: snyk/actions/maven-3-jdk-21@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --sarif-file-output=sarif/${{ github.event.repository.name }}.snyk.sca.${{ github.run_number }}.sarif

      - name: SCA GAS Upload
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: sarif/${{ github.event.repository.name }}.snyk.sca.${{ github.run_number }}.sarif

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: 'us-east-1'

      - name: Upload SCA SARIF to S3
        run: |
          aws s3 cp \
            sarif/${{ github.event.repository.name }}.snyk.sca.${{ github.run_number }}.sarif \
            s3://${{ secrets.AWS_S3_DOJO_BUCKET }}/${{ github.event.repository.name }}.snyk.sca.${{ github.run_number }}.sarif \
            --sse aws:kms \
            --no-progress

  security-sast:
    needs: [ build ]
    runs-on: ubuntu-latest
    container:
      image: emgrep/semgrep:latest

    # Skip any PR created by dependabot to avoid permission issues:
    if: (github.actor != 'dependabot[bot]')

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history helps Semgrep diff-aware scanning on PRs
          fetch-depth: 0

      # ── 2. (Optional) Build first so bytecode is available ───
      # Semgrep analyses source, not bytecode, so the build step
      # is only needed if you generate sources (e.g. ANTLR, JOOQ).
      # Remove or comment out if not applicable.
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Maven compile (generated sources only)
        run: mvn --batch-mode --no-transfer-progress generate-sources
        # Use 'compile' instead if Semgrep rules target .class paths or
        # your project relies on annotation-processor-generated files.

      # ── 3. Run Semgrep and emit SARIF ────────────────────────
      - name: Run Semgrep SAST
        run: |
          semgrep scan \
            --sarif \
            --output semgrep.sarif \
            --config "p/java"                \
            --config "p/security-audit"      \
            --config "p/owasp-top-ten"       \
            --config "p/secrets"             \
            --metrics off                    \
            --severity WARNING               \
            --timeout 300                    \
            --jobs "$(nproc)"               \
            .
        # Environment variable enables Semgrep AppSec Platform features
        # (PR comments, dashboard, managed rules).  Leave unset for
        # fully offline / open-source usage.
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      # ── 4. Upload SARIF as a pipeline artifact ───────────────
      - name: Upload SARIF artifact
        if: always() # upload even when Semgrep exits non-zero
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif-${{ github.run_number }}
          path: semgrep.sarif
          retention-days: 2

      # ── 5. Push results to GitHub Security tab ───────────────
      # Requires 'security-events: write' permission above and
      # GitHub Advanced Security (GHAS) on private repositories.
      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: 'us-east-1'

      - name: Upload SAST SARIF to S3
        run: |
          aws s3 cp \
            semgrep.sarif \
            s3://${{ secrets.AWS_S3_DOJO_BUCKET }}/${{ github.event.repository.name }}.semgrep-ce.sast.${{ github.run_number }}.sarif \
            --sse aws:kms \
            --no-progress
